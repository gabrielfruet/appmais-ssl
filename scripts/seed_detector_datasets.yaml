# Source datasets for the seed detector.
#
# Each entry is one Roboflow Universe dataset we will merge. The slug is used
# as a filename prefix in the merged dataset so the source of every image stays
# traceable. Set ``version: null`` to take the latest public version.
#
# `hornet-detection-1wa7m/bee-detection-kx8ggo` from the original list is
# unreachable with our API key (workspace permissions error) and is skipped —
# see docs/DATASETS.md for the list of datasets actually used.

